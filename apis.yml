apis:
- aid: openfga:openfga-api
  name: OpenFGA Authorization API
  description: >-
    The OpenFGA API provides HTTP and gRPC endpoints for fine-grained
    authorization. Key operations include Check for evaluating access
    decisions, Write for managing relationship tuples, Read for querying
    relationships, ListObjects for finding accessible resources, and
    Expand for debugging authorization models. The API also supports
    store management and authorization model versioning.
  humanURL: https://openfga.dev/docs/getting-started
