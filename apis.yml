aid: openfga
name: OpenFGA
description: >-
  OpenFGA is a CNCF incubating high-performance authorization system
  implementing fine-grained access control based on the Zanzibar model.
  It provides a flexible relationship-based authorization engine that
  evaluates access decisions using a type system defined in a modeling
  language. OpenFGA supports authorization checks, relationship queries,
  and list operations through its API.
url: https://openfga.dev
